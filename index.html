<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程追蹤板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#f0efeb;--tx:#1a1a18;--tx2:#6b6b67;--tx3:#9b9b96;--bd:rgba(0,0,0,.10);--bd2:rgba(0,0,0,.18);--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--tx:#f0efe9;--tx2:#a8a8a2;--tx3:#6b6b67;--bd:rgba(255,255,255,.10);--bd2:rgba(255,255,255,.18)}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--tx);min-height:100vh;padding:2rem 1rem}
.wrap{max-width:920px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:2rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync{font-size:12px;color:var(--tx3);font-weight:400}
.sec-label{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:12px;color:var(--tx2);margin-bottom:6px}
.stat-val{font-size:22px;font-weight:500}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:3px}
.bar-bg{background:var(--bd);border-radius:99px;height:5px;margin-top:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
.controls{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.fbtn{font-size:12px;padding:5px 13px;border-radius:99px;border:.5px solid var(--bd2);background:var(--bg);color:var(--tx2);cursor:pointer}
.fbtn.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.ctrl-btns{margin-left:auto;display:flex;gap:6px}
.add-btn,.mgr-btn{font-size:13px;padding:6px 14px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);cursor:pointer}
.add-btn:hover,.mgr-btn:hover{background:var(--bg2)}
/* Drag grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;transition:border-color .15s,box-shadow .15s;cursor:grab;user-select:none}
.card:hover{border-color:var(--bd2)}
.card.dragging{opacity:.4;box-shadow:0 8px 24px rgba(0,0,0,.15);cursor:grabbing}
.card.drag-over{border-color:var(--tx);box-shadow:0 0 0 2px var(--tx)}
.thumb{width:100%;height:120px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;text-decoration:none;cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.thumb-icon{font-size:42px;pointer-events:none}
.play-ov{position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:30px;color:#fff;pointer-events:none}
.thumb:hover .play-ov{opacity:1}
.drag-handle{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.4);color:#fff;border-radius:4px;font-size:11px;padding:2px 5px;cursor:grab;pointer-events:all}
.card-body{padding:12px 14px 14px}
.card-plat{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.card-title{font-size:13px;font-weight:500;line-height:1.45;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prog-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.prog-pct{font-size:12px;font-weight:500}
.prog-ch{font-size:11px;color:var(--tx3)}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:99px}
.b-todo{background:#F1EFE8;color:#5F5E5A}
.b-doing{background:#E6F1FB;color:#185FA5}
.b-done{background:#EAF3DE;color:#3B6D11}
@media(prefers-color-scheme:dark){.b-todo{background:#2e2d29;color:#a8a8a0}.b-doing{background:#0c2340;color:#6aadee}.b-done{background:#152810;color:#7ec95a}}
.card-acts{display:flex;gap:3px}
.cbtn{width:26px;height:26px;border-radius:var(--r);border:.5px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.cbtn:hover{background:var(--bg2)}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx3);font-size:14px;display:none}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:1.5rem}
.pg-btn{width:32px;height:32px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.pg-btn:hover{background:var(--bg2)}
.pg-btn.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.pg-info{font-size:12px;color:var(--tx3)}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center;z-index:100}
.overlay.open{display:flex}
.modal{background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--rl);padding:1.5rem;width:420px;max-width:calc(100vw - 2rem);max-height:90vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:500;margin-bottom:1.1rem}
.fg{margin-bottom:12px}
.fl{font-size:12px;color:var(--tx2);margin-bottom:4px;display:block}
.fg input,.fg select{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx);outline:none;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--tx2)}
.frow{display:flex;gap:8px}
.frow .fg{flex:1}
.prev-box{width:100%;height:110px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--tx3);font-size:13px;margin-top:8px}
.prev-box img{width:100%;height:100%;object-fit:cover}
.img-btns{display:flex;gap:6px;margin-top:8px}
.img-btn{flex:1;padding:7px 6px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx);cursor:pointer;font-size:12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px}
.img-btn:hover{background:var(--bg3)}
.hint{font-size:11px;color:var(--tx3);margin-top:6px;line-height:1.5}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:1.2rem}
.btn-ok{background:var(--tx);color:var(--bg);border:none;font-size:13px;padding:7px 18px;border-radius:var(--r);cursor:pointer}
.btn-no{background:transparent;color:var(--tx2);border:.5px solid var(--bd2);font-size:13px;padding:7px 18px;border-radius:var(--r);cursor:pointer}
.btn-no:hover{background:var(--bg2)}
/* Platform manager */
.plat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.plat-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:var(--r);background:var(--bg2);font-size:13px}
.plat-del{background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:16px;padding:0 4px}
.plat-del:hover{color:#e24b4a}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);font-size:13px;padding:10px 20px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 課程追蹤板 <span class="sync" id="sync-status"></span></h1>
  <div class="sec-label">總覽</div>
  <div class="stats">
    <div class="stat"><div class="stat-label">課程總數</div><div class="stat-val" id="s-total">0</div><div class="stat-sub">所有平台</div></div>
    <div class="stat"><div class="stat-label">整體完成率</div><div class="stat-val" id="s-rate">0%</div><div class="bar-bg"><div class="bar-fill" id="s-bar" style="width:0%;background:#639922"></div></div></div>
    <div class="stat"><div class="stat-label">進行中</div><div class="stat-val" id="s-doing">0</div><div class="stat-sub">課程</div></div>
    <div class="stat"><div class="stat-label">已完成</div><div class="stat-val" id="s-done">0</div><div class="stat-sub">課程</div></div>
  </div>
  <div class="controls">
    <button class="fbtn on" data-filter="all">全部</button>
    <button class="fbtn" data-filter="todo">未開始</button>
    <button class="fbtn" data-filter="doing">進行中</button>
    <button class="fbtn" data-filter="done">已完成</button>
    <div class="ctrl-btns">
      <button class="mgr-btn" id="btn-mgr">⚙️ 平台管理</button>
      <button class="add-btn" id="btn-add">＋ 新增課程</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">還沒有課程，點右上角「新增課程」開始追蹤吧！</div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Course modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">新增課程</h2>
    <div class="fg"><label class="fl">課程名稱</label><input type="text" id="f-name" placeholder="例：Python 機器學習實戰"></div>
    <div class="frow">
      <div class="fg">
        <label class="fl">平台</label>
        <select id="f-platform"></select>
        <input type="text" id="f-custom" placeholder="輸入平台名稱" style="margin-top:6px;display:none">
      </div>
      <div class="fg"><label class="fl">狀態</label>
        <select id="f-status">
          <option value="todo">未開始</option><option value="doing">進行中</option><option value="done">已完成</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">進度 (%)</label><input type="number" id="f-progress" min="0" max="100" value="0"></div>
      <div class="fg"><label class="fl">章節（選填）</label><input type="text" id="f-chapter" placeholder="例：第 3 章"></div>
    </div>
    <div class="fg"><label class="fl">課程連結</label><input type="url" id="f-url" placeholder="https://..."></div>
    <div class="fg">
      <label class="fl">封面圖片</label>
      <div class="prev-box" id="preview">尚未設定封面</div>
      <input type="hidden" id="f-img">
      <div class="img-btns">
        <button class="img-btn" id="fetch-btn">🔍 自動抓取</button>
        <label class="img-btn">📁 從電腦上傳<input type="file" id="f-img-upload" accept="image/*" style="display:none"></label>
      </div>
      <div class="hint">💡 抓取失敗時，截圖課程封面後點「從電腦上傳」<br>⚠️ 上傳的圖片只存在本機，換電腦會消失。建議先上傳到 <a href="https://imgur.com" target="_blank" rel="noopener" style="color:var(--tx2)">imgur.com</a>（免費，不用註冊），再複製圖片網址貼到下方</div>
      <input type="url" id="f-img-manual" placeholder="或手動貼上圖片網址" style="margin-top:6px">
    </div>
    <div class="mfoot">
      <button class="btn-no" id="btn-cancel">取消</button>
      <button class="btn-ok" id="btn-save">儲存</button>
    </div>
  </div>
</div>

<!-- Platform manager modal -->
<div class="overlay" id="mgr-overlay">
  <div class="modal">
    <h2>⚙️ 平台管理</h2>
    <div class="plat-list" id="plat-list"></div>
    <div class="mfoot">
      <button class="btn-no" id="btn-mgr-close">關閉</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var API = 'https://script.google.com/macros/s/AKfycbwvgvHGhqdEgS05vi8Xp__L0h4mraUzpDkuaLSpW6kXVicNKUS8DZFFSTrdiwOa2VIbTA/exec';
  var TOKEN = 'honor0425-secret-2026';
  var LOCAL_KEY = 'course-tracker-v1';
  var PLAT_KEY = 'ct-platforms';
  var PER_PAGE = 8;
  var DEFAULT_PLATFORMS = ['hahow','pressplay'];

  var courses = [];
  var filter = 'all';
  var editingId = null;
  var currentPage = 1;
  var dragSrcIdx = null;
  var autoFlipTimer = null;
  var EDGE = 80;

  function clearAutoFlip(){ if(autoFlipTimer){ clearTimeout(autoFlipTimer); autoFlipTimer=null; } }

  function startAutoFlipTo(page){
    clearAutoFlip();
    autoFlipTimer=setTimeout(function(){
      currentPage=page;
      render();
      autoFlipTimer=null;
    },600);
  }

  function startAutoFlip(dir){
    if(autoFlipTimer) return;
    autoFlipTimer=setInterval(function(){
      var visible=getVisible();
      var totalPages=Math.max(1,Math.ceil(visible.length/PER_PAGE));
      if(dir==='prev'&&currentPage>1){ currentPage--; render(); }
      else if(dir==='next'&&currentPage<totalPages){ currentPage++; render(); }
      else{ clearAutoFlip(); }
    },800);
  }

  // --- Platform management ---
  function getExtraPlatforms() {
    try { return JSON.parse(localStorage.getItem(PLAT_KEY)) || []; } catch(e) { return []; }
  }
  function saveExtraPlatforms(arr) {
    localStorage.setItem(PLAT_KEY, JSON.stringify(arr));
  }
  function getPlatforms() {
    var extra = getExtraPlatforms();
    var all = DEFAULT_PLATFORMS.slice();
    courses.forEach(function(c){
      var p=(c.platform||'').trim();
      if(p && all.indexOf(p)<0) all.push(p);
    });
    extra.forEach(function(p){
      var pt=p.trim();
      if(pt && all.indexOf(pt)<0) all.push(pt);
    });
    return all;
  }
  function savePlatform(p) {
    p=(p||'').trim();
    if(!p || DEFAULT_PLATFORMS.indexOf(p)>=0 || p==='其他') return;
    var extra=getExtraPlatforms();
    if(extra.indexOf(p)<0){ extra.push(p); saveExtraPlatforms(extra); }
  }
  function deletePlatform(p) {
    var extra=getExtraPlatforms().filter(function(x){ return x!==p; });
    saveExtraPlatforms(extra);
  }

  function buildPlatformSelect(current) {
    var sel=document.getElementById('f-platform');
    var platforms=getPlatforms();
    sel.innerHTML='';
    platforms.forEach(function(p){
      var o=document.createElement('option');
      o.value=p; o.textContent=p; sel.appendChild(o);
    });
    var oth=document.createElement('option');
    oth.value='__other__'; oth.textContent='其他...'; sel.appendChild(oth);
    if(current){
      if(platforms.indexOf(current)>=0) sel.value=current;
      else { sel.value='__other__'; document.getElementById('f-custom').style.display='block'; document.getElementById('f-custom').value=current; }
    }
  }

  function openPlatformManager() {
    var list=document.getElementById('plat-list');
    var extra=getExtraPlatforms();
    if(extra.length===0){
      list.innerHTML='<div style="font-size:13px;color:var(--tx3);padding:8px 0">尚未新增自定義平台</div>';
    } else {
      list.innerHTML=extra.map(function(p){
        return '<div class="plat-item"><span>'+esc(p)+'</span><button class="plat-del" data-p="'+esc(p)+'">✕</button></div>';
      }).join('');
      list.querySelectorAll('.plat-del').forEach(function(btn){
        btn.addEventListener('click',function(){
          var p=this.getAttribute('data-p');
          deletePlatform(p);
          toast('已刪除平台：'+p);
          openPlatformManager();
        });
      });
    }
    document.getElementById('mgr-overlay').classList.add('open');
  }

  // --- Toast & sync ---
  function toast(msg){
    var el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); },2500);
  }
  function sync(msg){ document.getElementById('sync-status').textContent=msg; }

  // --- API ---
  function apiGet(){ return fetch(API+'?token='+TOKEN).then(function(r){ return r.json(); }); }
  function apiSave(data){
    var stripped=data.map(function(c){
      var copy={}; for(var k in c) copy[k]=c[k];
      if(copy.img&&copy.img.indexOf('data:')===0) copy.img='';
      return copy;
    });
    return fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({token:TOKEN,action:'save',courses:stripped})});
  }
  function saveLocal(){ try{ localStorage.setItem(LOCAL_KEY,JSON.stringify(courses)); }catch(e){} }

  // --- Init ---
  function init(){
    sync('⏳ 載入中...');
    var local=null;
    try{ local=JSON.parse(localStorage.getItem(LOCAL_KEY)); }catch(e){}
    apiGet().then(function(data){
      if(Array.isArray(data)){
        if(data.length>0){
          courses=data;
          courses.forEach(function(c){ c.progress=parseInt(c.progress)||0; });
          sync('✅ 已同步'); render();
        } else if(local&&local.length>0){
          courses=local;
          sync('⏳ 匯入舊資料...');
          apiSave(local).then(function(){ localStorage.removeItem(LOCAL_KEY); toast('✅ 舊資料已匯入！'); sync('✅ 已同步'); })
            .catch(function(){ sync('⚠️ 匯入失敗'); });
          render();
        } else { courses=[]; sync('✅ 已同步'); render(); }
      } else { throw new Error(); }
    }).catch(function(){ courses=local||[]; sync('⚠️ 離線模式'); render(); });
  }

  function doSave(){
    saveLocal(); render(); sync('⏳ 儲存中...');
    apiSave(courses).then(function(){ sync('✅ 已同步'); toast('✅ 已儲存'); })
      .catch(function(){ sync('⚠️ 雲端失敗（本機已儲存）'); toast('⚠️ 本機已儲存'); });
  }

  // --- Helpers ---
  function progColor(p){ if(p>=100)return'#639922'; if(p>=50)return'#185FA5'; if(p>0)return'#BA7517'; return'#888780'; }
  function platBg(p){
    var n=(p||'').toLowerCase();
    if(n==='udemy')return'#a435f0'; if(n==='coursera')return'#0056d2';
    if(n==='youtube')return'#ff0000'; if(n==='hahow')return'#f65858';
    if(n==='pressplay')return'#1a1a2e'; return'#6b6b67';
  }
  function badgeHtml(s){
    if(s==='done')return'<span class="badge b-done">✓ 已完成</span>';
    if(s==='doing')return'<span class="badge b-doing">▶ 進行中</span>';
    return'<span class="badge b-todo">○ 未開始</span>';
  }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // --- Render ---
  function getVisible(){ return filter==='all'?courses:courses.filter(function(c){ return c.status===filter; }); }

  function render(){
    var visible=getVisible();
    var total=courses.length;
    var done=courses.filter(function(c){ return c.status==='done'; }).length;
    var doing=courses.filter(function(c){ return c.status==='doing'; }).length;
    var avg=total?Math.round(courses.reduce(function(s,c){ return s+(parseInt(c.progress)||0); },0)/total):0;
    document.getElementById('s-total').textContent=total;
    document.getElementById('s-rate').textContent=avg+'%';
    document.getElementById('s-bar').style.width=avg+'%';
    document.getElementById('s-doing').textContent=doing;
    document.getElementById('s-done').textContent=done;

    var totalPages=Math.max(1,Math.ceil(visible.length/PER_PAGE));
    if(currentPage>totalPages) currentPage=totalPages;
    var start=(currentPage-1)*PER_PAGE;
    var pageItems=visible.slice(start,start+PER_PAGE);

    var grid=document.getElementById('grid');
    var empty=document.getElementById('empty');
    if(visible.length===0){ grid.innerHTML=''; empty.style.display='block'; renderPagination(0,0); return; }
    empty.style.display='none';

    var html='';
    for(var i=0;i<pageItems.length;i++){
      var c=pageItems[i];
      var globalIdx=courses.indexOf(c);
      var bg=platBg(c.platform);
      var inner=c.img?'<img src="'+esc(c.img)+'" alt="" onerror="this.style.display=\'none\'">'
                     :'<span class="thumb-icon">📖</span>';
      var style=c.img&&c.img.length>0?'':'background:'+bg+';';
      var thumbInner=inner+'<div class="play-ov">▶</div><div class="drag-handle">☰</div>';
      var thumb=c.url
        ?'<a href="'+esc(c.url)+'" class="thumb" target="_blank" rel="noopener" style="'+style+'" data-href="'+esc(c.url)+'">'+thumbInner+'</a>'
        :'<div class="thumb" style="'+style+'">'+thumbInner+'</div>';
      html+='<div class="card" draggable="true" data-idx="'+globalIdx+'">'+thumb+
        '<div class="card-body">'+
        '<div class="card-plat">'+esc(c.platform)+'</div>'+
        '<div class="card-title">'+esc(c.name)+'</div>'+
        '<div class="prog-row"><span class="prog-pct">'+(c.progress||0)+'%</span><span class="prog-ch">'+esc(c.chapter||'')+'</span></div>'+
        '<div class="bar-bg"><div class="bar-fill" style="width:'+(c.progress||0)+'%;background:'+progColor(c.progress||0)+'"></div></div>'+
        '<div class="card-foot">'+badgeHtml(c.status)+
        '<div class="card-acts">'+
        '<button class="cbtn" data-edit="'+esc(c.id)+'" title="編輯">✏️</button>'+
        '<button class="cbtn" data-del="'+esc(c.id)+'" title="刪除">🗑️</button>'+
        '</div></div></div></div>';
    }
    grid.innerHTML=html;

    // Drag and drop
    var cards=grid.querySelectorAll('.card');

    cards.forEach(function(card){
      card.addEventListener('dragstart',function(e){
        dragSrcIdx=parseInt(this.getAttribute('data-idx'));
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
      });
      card.addEventListener('dragend',function(){
        this.classList.remove('dragging');
        clearAutoFlip();
        grid.querySelectorAll('.card').forEach(function(c){ c.classList.remove('drag-over'); });
      });
      card.addEventListener('dragover',function(e){
        e.preventDefault(); e.dataTransfer.dropEffect='move';
        grid.querySelectorAll('.card').forEach(function(c){ c.classList.remove('drag-over'); });
        this.classList.add('drag-over');
      });
      card.addEventListener('drop',function(e){
        e.preventDefault();
        clearAutoFlip();
        var targetIdx=parseInt(this.getAttribute('data-idx'));
        if(dragSrcIdx===null||dragSrcIdx===targetIdx) return;
        var moved=courses.splice(dragSrcIdx,1)[0];
        courses.splice(targetIdx,0,moved);
        dragSrcIdx=null;
        doSave();
      });
      // Prevent drag from opening link
      var thumb=card.querySelector('a.thumb');
      if(thumb){
        thumb.addEventListener('click',function(e){
          if(card.classList.contains('dragging')) e.preventDefault();
        });
      }
    });

    // Edit / delete
    grid.querySelectorAll('[data-edit]').forEach(function(btn){
      btn.addEventListener('click',function(e){ e.stopPropagation(); openModal(this.getAttribute('data-edit')); });
    });
    grid.querySelectorAll('[data-del]').forEach(function(btn){
      btn.addEventListener('click',function(e){ e.stopPropagation(); deleteCourse(this.getAttribute('data-del')); });
    });

    renderPagination(totalPages,visible.length);
  }

  function renderPagination(totalPages,total){
    var pg=document.getElementById('pagination');
    if(totalPages<=1){ pg.innerHTML=''; return; }
    var html='<button class="pg-btn" id="pg-prev">‹</button>';
    for(var i=1;i<=totalPages;i++){
      html+='<button class="pg-btn'+(i===currentPage?' on':'')+'" data-page="'+i+'">'+i+'</button>';
    }
    html+='<button class="pg-btn" id="pg-next">›</button>';
    html+='<span class="pg-info">共 '+total+' 筆</span>';
    pg.innerHTML=html;
    pg.querySelector('#pg-prev').addEventListener('click',function(){ if(currentPage>1){ currentPage--; render(); } });
    pg.querySelector('#pg-next').addEventListener('click',function(){ if(currentPage<totalPages){ currentPage++; render(); } });
    pg.querySelectorAll('[data-page]').forEach(function(btn){
      btn.addEventListener('click',function(){ currentPage=parseInt(this.getAttribute('data-page')); render(); });
      btn.addEventListener('dragenter',function(e){
        e.preventDefault();
        var page=parseInt(this.getAttribute('data-page'));
        if(page===currentPage) return;
        this.style.transform='scale(1.25)';
        this.style.background='var(--tx)';
        this.style.color='var(--bg)';
        clearAutoFlip();
        autoFlipTimer=setTimeout(function(){
          currentPage=page;
          dragSrcIdx=null;
          render();
        },600);
      });
      btn.addEventListener('dragleave',function(){
        this.style.transform='';
        this.style.background='';
        this.style.color='';
        clearAutoFlip();
      });
      btn.addEventListener('dragover',function(e){ e.preventDefault(); });
      btn.addEventListener('drop',function(e){ e.preventDefault(); });
    });
  }

  // --- Modal ---
  function setPreview(url){
    var box=document.getElementById('preview');
    document.getElementById('f-img').value=url||'';
    if(url){ box.innerHTML='<img src="'+esc(url)+'" onerror="this.parentNode.textContent=\'圖片載入失敗\'">'; }
    else{ box.textContent='尚未設定封面'; }
  }

  function openModal(id){
    editingId=id||null;
    document.getElementById('modal-title').textContent=id?'編輯課程':'新增課程';
    if(id){
      var c=null;
      for(var i=0;i<courses.length;i++){ if(String(courses[i].id)===String(id)){ c=courses[i]; break; } }
      if(!c) return;
      document.getElementById('f-name').value=c.name||'';
      buildPlatformSelect(c.platform);
      document.getElementById('f-status').value=c.status||'todo';
      document.getElementById('f-progress').value=c.progress||0;
      document.getElementById('f-chapter').value=c.chapter||'';
      document.getElementById('f-url').value=c.url||'';
      document.getElementById('f-img-manual').value='';
      setPreview(c.img||'');
    } else {
      document.getElementById('f-name').value='';
      buildPlatformSelect('Udemy');
      document.getElementById('f-custom').style.display='none';
      document.getElementById('f-custom').value='';
      document.getElementById('f-status').value='todo';
      document.getElementById('f-progress').value=0;
      document.getElementById('f-chapter').value='';
      document.getElementById('f-url').value='';
      document.getElementById('f-img-manual').value='';
      setPreview('');
    }
    document.getElementById('overlay').classList.add('open');
    setTimeout(function(){ document.getElementById('f-name').focus(); },50);
  }

  function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

  function getPlatform(){
    var sel=document.getElementById('f-platform');
    if(sel.value==='__other__') return document.getElementById('f-custom').value.trim()||'其他';
    return sel.value;
  }

  function saveCourse(){
    var name=document.getElementById('f-name').value.trim();
    if(!name){ alert('請輸入課程名稱'); return; }
    var manualImg=document.getElementById('f-img-manual').value.trim();
    if(manualImg) setPreview(manualImg);
    var platform=getPlatform();
    savePlatform(platform);
    var data={
      id:editingId||String(Date.now()), name:name, platform:platform,
      status:document.getElementById('f-status').value,
      progress:Math.min(100,Math.max(0,parseInt(document.getElementById('f-progress').value)||0)),
      chapter:document.getElementById('f-chapter').value.trim(),
      url:document.getElementById('f-url').value.trim(),
      img:document.getElementById('f-img').value.trim()
    };
    if(editingId){
      for(var i=0;i<courses.length;i++){ if(String(courses[i].id)===String(editingId)){ courses[i]=data; break; } }
    } else { courses.push(data); }
    closeModal(); doSave();
  }

  function deleteCourse(id){
    if(!confirm('確定要刪除這個課程嗎？')) return;
    courses=courses.filter(function(c){ return String(c.id)!==String(id); });
    doSave();
  }

  // Page flip via dragging over pagination buttons
  document.addEventListener('dragover', function(e) {
    if (dragSrcIdx === null) return;
    var pgBtns = document.querySelectorAll('.pg-btn[data-page]');
    pgBtns.forEach(function(btn) {
      var rect = btn.getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right &&
          e.clientY >= rect.top && e.clientY <= rect.bottom) {
        var page = parseInt(btn.getAttribute('data-page'));
        if (page !== currentPage) {
          btn.classList.add('on');
          startAutoFlipTo(page);
        }
      }
    });
  });
  document.addEventListener('dragend', function() { clearAutoFlip(); });

  // --- Events ---
  document.getElementById('btn-add').addEventListener('click',function(){ openModal(null); });
  document.getElementById('btn-mgr').addEventListener('click',openPlatformManager);
  document.getElementById('btn-mgr-close').addEventListener('click',function(){ document.getElementById('mgr-overlay').classList.remove('open'); });
  document.getElementById('btn-cancel').addEventListener('click',closeModal);
  document.getElementById('btn-save').addEventListener('click',saveCourse);
  document.getElementById('overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
  document.getElementById('mgr-overlay').addEventListener('click',function(e){ if(e.target===this) this.classList.remove('open'); });
  document.getElementById('f-platform').addEventListener('change',function(){
    var ci=document.getElementById('f-custom');
    ci.style.display=this.value==='__other__'?'block':'none';
    if(this.value==='__other__') ci.focus();
  });
  document.getElementById('f-img-manual').addEventListener('input',function(){
    var val=this.value.trim(); if(val) setPreview(val);
  });
  document.getElementById('f-img-upload').addEventListener('change',function(){
    var file=this.files[0]; if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){ setPreview(e.target.result); };
    reader.readAsDataURL(file);
  });
  document.getElementById('fetch-btn').addEventListener('click',function(){
    var url=document.getElementById('f-url').value.trim();
    if(!url){ alert('請先填入課程連結'); return; }
    var btn=this; btn.textContent='抓取中...'; btn.disabled=true;
    fetch('https://api.microlink.io/?url='+encodeURIComponent(url))
      .then(function(r){ return r.json(); })
      .then(function(d){
        var img=d&&d.data&&d.data.image&&d.data.image.url;
        if(img){ setPreview(img); }
        else{ alert('自動抓取失敗，請截圖後點「從電腦上傳」'); }
      })
      .catch(function(){ alert('自動抓取失敗，請截圖後點「從電腦上傳」'); })
      .finally(function(){ btn.textContent='🔍 自動抓取'; btn.disabled=false; });
  });
  document.querySelectorAll('.fbtn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('on'); });
      this.classList.add('on');
      filter=this.getAttribute('data-filter');
      currentPage=1; render();
    });
  });

  init();
})();
</script>
</body>
</html>
